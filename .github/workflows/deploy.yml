name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # --- Run Migrations ---
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @property-search/api exec tsx src/db/migrate.ts
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

      # --- Deploy ---
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy --config apps/api/fly.toml --remote-only

      - name: Deploy Web
        run: flyctl deploy --config apps/web/fly.toml --remote-only

      - name: Deploy Crawler
        run: flyctl deploy --config apps/crawler/fly.toml --remote-only
