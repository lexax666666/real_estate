app = "property-search-web"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile.web"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://property-search-api.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
