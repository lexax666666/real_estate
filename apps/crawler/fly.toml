app = "property-search-crawler"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile.crawler"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "30s"
  interval = "60s"
  method = "GET"
  timeout = "10s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
